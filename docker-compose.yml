services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hyeyum-ai
    depends_on:
      weaviate:
        condition: service_healthy
    ports:
      - "${AI_PORT:-8000}:8000"
    environment:
      APP_NAME: ${APP_NAME:-hyeyum-ai}
      APP_ENV: ${APP_ENV:-prod}
      ROOT_PATH: ${ROOT_PATH:-/ai}
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
      MAX_UPLOAD_FILE_SIZE_MB: ${MAX_UPLOAD_FILE_SIZE_MB:-100}
      SEED_TRAINING_DATA_DIR: ${SEED_TRAINING_DATA_DIR:-app/seeds/training-data}
      WEAVIATE_URL: ${WEAVIATE_URL:-http://weaviate:8080}
      WEAVIATE_GRPC_HOST: ${WEAVIATE_GRPC_HOST:-weaviate:50051}
      WEAVIATE_COLLECTION: ${WEAVIATE_COLLECTION:-TrainingDocument}
      WEAVIATE_INGEST_ENABLED: ${WEAVIATE_INGEST_ENABLED:-true}
      WEAVIATE_REQUEST_TIMEOUT_SECONDS: ${WEAVIATE_REQUEST_TIMEOUT_SECONDS:-120}
      SEED_TRAINING_DATA_ON_STARTUP: ${SEED_TRAINING_DATA_ON_STARTUP:-true}
      SEED_TRAINING_DATA_STATE_FILE: ${SEED_TRAINING_DATA_STATE_FILE:-.training-data-seed-state.json}
      SEED_TRAINING_DATA_MAX_ATTEMPTS: ${SEED_TRAINING_DATA_MAX_ATTEMPTS:-60}
      SEED_TRAINING_DATA_RETRY_DELAY_SECONDS: ${SEED_TRAINING_DATA_RETRY_DELAY_SECONDS:-5}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./uploads:/app/uploads
    networks:
      - hyeyum-network
    restart: unless-stopped

  weaviate:
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --scheme
      - http
    image: cr.weaviate.io/semitechnologies/weaviate:1.38.3
    container_name: hyeyum-weaviate
    ports:
      - "${WEAVIATE_PORT:-8081}:8080"
      - "${WEAVIATE_GRPC_PORT:-50051}:50051"
    volumes:
      - weaviate_data:/var/lib/weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: ${WEAVIATE_QUERY_DEFAULTS_LIMIT:-25}
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: ${WEAVIATE_ANONYMOUS_ACCESS_ENABLED:-true}
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      CLUSTER_HOSTNAME: node1
      ENABLE_MODULES: ${WEAVIATE_ENABLE_MODULES:-text2vec-openai}
      DEFAULT_VECTORIZER_MODULE: ${WEAVIATE_DEFAULT_VECTORIZER_MODULE:-text2vec-openai}
      OPENAI_APIKEY: ${OPENAI_API_KEY:-}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -T 3 -O - http://localhost:8080/v1/.well-known/ready || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - hyeyum-network
    restart: unless-stopped

volumes:
  weaviate_data:

networks:
  hyeyum-network:
    external: true
